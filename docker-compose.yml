# 从 Docker Hub 拉取镜像（推荐）
services:
  device-mgr:
    image: mibusix/device-management:latest
    container_name: device-mgr
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - HTTPS=0
    volumes:
      - ./data:/app/data
    restart: unless-stopped

