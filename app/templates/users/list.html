{% extends "base.html" %}
{% block title %}用户管理 - 设备管理系统{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto" x-data="userManager()">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">用户管理</h1>
    <template x-if="isAdmin">
      <button @click="showModal = true; editingUser = null"
              class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors">
        创建用户
      </button>
    </template>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gray-50 dark:bg-gray-800 border-b dark:border-gray-700">
          <tr>
            <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 dark:text-gray-500">ID</th>
            <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 dark:text-gray-500">用户名</th>
            <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 dark:text-gray-500">角色</th>
            <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 dark:text-gray-500">状态</th>
            <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 dark:text-gray-500">创建时间</th>
            <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 dark:text-gray-500" x-show="isAdmin">操作</th>
          </tr>
        </thead>
        <tbody class="divide-y">
          <template x-for="u in users" :key="u.id">
            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
              <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300" x-text="u.id"></td>
              <td class="px-4 py-3 text-sm font-medium text-gray-800 dark:text-gray-100" x-text="u.username"></td>
              <td class="px-4 py-3">
                <span x-show="u.role === 'admin'" class="px-2 py-0.5 bg-red-100 text-red-700 text-xs rounded-full">管理员</span>
                <span x-show="u.role === 'user'" class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded-full">普通用户</span>
                <span x-show="u.role === 'guest'" class="px-2 py-0.5 bg-gray-100 text-gray-600 dark:text-gray-300 text-xs rounded-full">访客</span>
              </td>
              <td class="px-4 py-3">
                <span x-show="u.is_active" class="px-2 py-0.5 bg-green-100 text-green-700 text-xs rounded-full">启用</span>
                <span x-show="!u.is_active" class="px-2 py-0.5 bg-red-100 text-red-700 text-xs rounded-full">禁用</span>
              </td>
              <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400 dark:text-gray-500" x-text="u.created_at"></td>
              <td class="px-4 py-3" x-show="isAdmin">
                <div class="flex gap-2">
                  <button @click="editUser(u)" class="text-xs text-primary-600 dark:text-primary-400 hover:text-primary-700 dark:hover:text-primary-300">编辑</button>
                  <button @click="deleteUser(u)" class="text-xs text-red-600 dark:text-red-400 hover:text-red-700">删除</button>
                </div>
              </td>
            </tr>
          </template>
          <tr x-show="users.length === 0">
            <td colspan="6" class="px-4 py-12 text-center text-gray-400 dark:text-gray-500">暂无用户</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4" @click.self="showModal = false">
    <div class="fixed inset-0 bg-black/30"></div>
    <div class="relative bg-white rounded-xl shadow-lg p-6 w-full max-w-sm">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4" x-text="editingUser ? '编辑用户' : '创建用户'"></h3>
      <form @submit.prevent="saveUser">
        <div class="mb-3">
          <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">用户名</label>
          <input type="text" x-model="form.username" required
                 class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1" x-text="editingUser ? '新密码（留空则不修改）' : '密码'"></label>
          <input type="password" x-model="form.password" :required="!editingUser"
                 class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">角色</label>
          <select x-model="form.role" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
            <option value="admin">管理员</option>
            <option value="user">普通用户</option>
            <option value="guest">访客</option>
          </select>
        </div>
        <div class="mb-4" x-show="editingUser">
          <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
            <input type="checkbox" x-model="form.is_active" class="rounded"> 启用账号
          </label>
        </div>
        <div x-show="modalError" class="mb-3 p-2 bg-red-50 border dark:border-gray-700 border-red-200 rounded text-sm text-red-600 dark:text-red-400" x-text="modalError"></div>
        <div class="flex gap-3">
          <button type="button" @click="showModal = false"
                  class="flex-1 py-2 border dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">取消</button>
          <button type="submit" :disabled="saving"
                  class="flex-1 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium disabled:opacity-50">
            <span x-show="!saving">保存</span>
            <span x-show="saving">保存中...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function userManager() {
  return {
    users: [],
    showModal: false,
    editingUser: null,
    modalError: '',
    saving: false,
    form: { username: '', password: '', role: 'user', is_active: true },
    isAdmin: {{ (current_user and current_user.role == 'admin') | lower }},

    async init() {
      await this.loadUsers();
    },

    async loadUsers() {
      try {
        const r = await fetch('/api/users/');
        if (r.ok) this.users = await r.json();
      } catch (e) {}
    },

    editUser(u) {
      this.editingUser = u;
      this.form = { username: u.username, password: '', role: u.role, is_active: !!u.is_active };
      this.modalError = '';
      this.showModal = true;
    },

    async saveUser() {
      this.modalError = '';
      this.saving = true;
      try {
        const body = { username: this.form.username, role: this.form.role };
        if (this.editingUser) {
          if (this.form.password) body.password = this.form.password;
          body.is_active = this.form.is_active ? 1 : 0;
          const r = await fetch(`/api/users/${this.editingUser.id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) { const d = await r.json(); throw new Error(d.detail || '保存失败'); }
        } else {
          body.password = this.form.password;
          const r = await fetch('/api/users/', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!r.ok) { const d = await r.json(); throw new Error(d.detail || '创建失败'); }
        }
        this.showModal = false;
        await this.loadUsers();
      } catch (e) {
        this.modalError = e.message;
      } finally {
        this.saving = false;
      }
    },

    async deleteUser(u) {
      if (!confirm('确定删除用户 "' + escapeJs(u.username) + '" 吗？')) return;
      try {
        const r = await fetch(`/api/users/${u.id}`, { method: 'DELETE' });
        if (!r.ok) { const d = await r.json(); alert(d.detail || '删除失败'); return; }
        await this.loadUsers();
      } catch (e) {}
    }
  }
}
</script>
{% endblock %}
