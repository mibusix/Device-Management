{% extends "base.html" %}
{% block title %}{{ '编辑设备' if device else '添加设备' }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto" x-data='deviceForm({{ device.id if device else "null" }}, {{ field_values_json | tojson if device else "{}" }})'>
  <div class="flex items-center gap-3 mb-6">
    <a href="/devices" class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:text-gray-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">{{ '编辑设备' if device else '添加设备' }}</h1>
  </div>

  <form @submit.prevent="submit" novalidate class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 p-6 space-y-5">
    <!-- 基础信息 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="sm:col-span-2">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">设备名称 <span class="text-red-500">*</span></label>
        <input type="text" x-model="form.name" required class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm focus:ring-1 focus:ring-primary-500 focus:border-primary-500" placeholder="例如：压缩机-01">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">设备类型 <span class="text-red-500">*</span></label>
        <select x-model="form.device_type_id" @change="onTypeChange" required class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
          <option value="">选择类型</option>
          {% for t in types %}
          <option value="{{ t.id }}">{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">子类型</label>
        <select x-model="form.sub_type_id" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
          <option value="">无</option>
          <template x-for="st in subTypes" :key="st.id">
            <option :value="st.id" x-text="st.name"></option>
          </template>
        </select>
      </div>
    </div>

    <!-- 位置 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">大区域 <span class="text-red-500">*</span></label>
        <select x-model="form.area_id" @change="onAreaChange" required class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
          <option value="">选择大区域</option>
          {% for a in areas %}
          <option value="{{ a.id }}">{{ a.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">小区域 <span class="text-red-500">*</span></label>
        <select x-model="form.sub_location_id" required class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
          <option value="">选择小区域</option>
          <template x-for="sl in subLocations" :key="sl.id">
            <option :value="sl.id" x-text="sl.name"></option>
          </template>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">状态</label>
        <select x-model="form.status" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
          <option value="正常">正常</option>
          <option value="故障">故障</option>
          <option value="报废">报废</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">额定功率 (W)</label>
        <input type="number" step="0.01" x-model="form.power_rating" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
      </div>

    </div>

    <!-- 自定义字段 (动态) -->
    <template x-if="fields.length > 0">
      <div>
        <h3 class="text-sm font-medium text-gray-700 dark:text-gray-200 mb-3 border-b dark:border-gray-700 pb-2">自定义参数</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <template x-for="f in fields" :key="f.id">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">
                <span x-text="f.name"></span>
                <span x-show="f.unit" class="text-gray-400 dark:text-gray-500" x-text="`(${f.unit})`"></span>
                <span x-show="f.required" class="text-red-500">*</span>
              </label>
              <template x-if="f.type == 'number'">
                <input type="number" step="0.01" x-model="fieldValues[f.id]" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
              </template>
              <template x-if="f.type != 'number'">
                <input type="text" x-model="fieldValues[f.id]" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm">
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">备注</label>
      <textarea x-model="form.notes" rows="3" class="w-full px-3 py-2 border dark:border-gray-700 rounded-lg text-sm"></textarea>
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-lg text-sm hover:bg-primary-700 transition-colors">
        {{ '保存修改' if device else '添加设备' }}
      </button>
      <a href="/devices" class="px-6 py-2 border dark:border-gray-700 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">取消</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function deviceForm(editId, fieldValuesData) {
  const isEdit = editId !== null;
  const serverFieldValues = fieldValuesData || {};
  const deviceData = {{ device_data | tojson }};
  return {
    form: {
      name: deviceData ? (deviceData.name || '') : '',
      device_type_id: deviceData ? (deviceData.device_type_id || '') : '',
      sub_type_id: deviceData ? (deviceData.sub_type_id || '') : '',
      area_id: deviceData ? (deviceData.area_id || '') : '',
      sub_location_id: deviceData ? (deviceData.sub_location_id || '') : '',
      status: deviceData ? (deviceData.status || '正常') : '正常',
      power_rating: deviceData ? (deviceData.power_rating || 0) : 0,
      notes: deviceData ? (deviceData.notes || '') : '',
    },
    subTypes: [],
    subLocations: [],
    fields: [],
    fieldValues: {},

    init() {
      if (isEdit) {
        this.loadTypes().then(() => {
          this.loadSubTypes();
          this.loadFields();
          this.loadSubLocations();
          this.loadFieldValues();
        });
      }
    },

    async loadTypes() {
      const r = await fetch('/api/devices/types');
      const types = await r.json();
      const t = types.find(x => x.id == this.form.device_type_id);
      if (t) {
        this.subTypes = t.sub_types || [];
        this.fields = t.fields || [];
      }
    },

    async loadSubTypes() {
      if (!this.form.device_type_id) return;
      const r = await fetch(`/api/devices/types/${this.form.device_type_id}/subs`);
      this.subTypes = await r.json();
    },

    async loadFields() {
      if (!this.form.device_type_id) return;
      const r = await fetch('/api/devices/types');
      const types = await r.json();
      const t = types.find(x => x.id == this.form.device_type_id);
      this.fields = t ? (t.fields || []) : [];
    },

    async loadSubLocations() {
      if (!this.form.area_id) return;
      const r = await fetch('/api/devices/locations');
      const areas = await r.json();
      const a = areas.find(x => x.id == this.form.area_id);
      this.subLocations = a ? (a.sub_locations || []) : [];
    },

    async loadFieldValues() {
      // 从服务端渲染的 JSON 回填已有字段值（编辑场景）
      this.fieldValues = { ...serverFieldValues };
    },

    onTypeChange() {
      this.form.sub_type_id = '';
      this.form.sub_type_id = '';
      this.loadSubTypes();
      this.loadFields();
    },

    onAreaChange() {
      this.form.sub_location_id = '';
      this.loadSubLocations();
    },

    async submit() {
      for (const f of this.fields) {
        const v = this.fieldValues[f.id];
        if (f.required && (v === '' || v == null)) {
          alert(`请填写「${f.name}」`);
          return;
        }
      }
      const payload = {
        ...this.form,
        device_type_id: parseInt(this.form.device_type_id),
        sub_type_id: this.form.sub_type_id ? parseInt(this.form.sub_type_id) : null,
        sub_location_id: parseInt(this.form.sub_location_id),
        power_rating: parseFloat(this.form.power_rating) || 0,
        field_values: this.fieldValues,
      };

      const url = isEdit ? `/api/devices/${editId}` : '/api/devices/';
      const method = isEdit ? 'PUT' : 'POST';

      const r = await fetch(url, {
        method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (data.ok) {
        window.location.href = '/devices/' + (data.id || editId);
      } else {
        alert('保存失败');
      }
    }
  }
}
</script>
{% endblock %}
