<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 设备管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {'50':'#eff6ff','100':'#dbeafe','200':'#bfdbfe','300':'#93c5fd','400':'#60a5fa','500':'#3b82f6','600':'#2563eb','700':'#1d4ed8','800':'#1e40af','900':'#1e3a8a'}
          }
        }
      }
    }
    ;(function(){
      const t = localStorage.getItem('theme')
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen flex items-center justify-center p-4 transition-colors" x-data="loginForm()">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">设备管理系统</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">请登录后使用</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700 p-6">
      <form @submit.prevent="doLogin">
        <div class="mb-4">
          <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1.5">用户名</label>
          <input type="text" x-model="username" required
                 class="w-full px-3 py-2.5 border dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                 placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="mb-6">
          <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1.5">密码</label>
          <input type="password" x-model="password" required
                 class="w-full px-3 py-2.5 border dark:border-gray-600 bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-100 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                 placeholder="请输入密码" autocomplete="current-password">
        </div>

        <div x-show="error" class="mb-4 p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-600 dark:text-red-400" x-text="error"></div>

        <button type="submit" :disabled="loading"
                class="w-full py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50">
          <span x-show="!loading">登录</span>
          <span x-show="loading" class="inline-flex items-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            登录中...
          </span>
        </button>
      </form>

      <div class="mt-4 pt-4 border-t dark:border-gray-700 text-center">
        <button @click="guestLogin" :disabled="loading"
                class="text-sm text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors disabled:opacity-50">
          访客登录
        </button>
      </div>
    </div>
  </div>

  <script>
    function loginForm() {
      return {
        username: '',
        password: '',
        error: '',
        loading: false,

        async doLogin() {
          this.error = '';
          this.loading = true;
          try {
            const r = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: this.username, password: this.password }),
            });
            const data = await r.json();
            if (!r.ok) {
              this.error = data.detail || '登录失败';
              return;
            }
            window.location.href = '/';
          } catch (e) {
            this.error = '网络错误，请重试';
          } finally {
            this.loading = false;
          }
        },

        async guestLogin() {
          this.username = 'guest';
          this.password = 'guest';
          await this.doLogin();
        }
      }
    }
  </script>

  <div class="fixed bottom-0 left-0 right-0 p-4 flex justify-center">
    <a href="https://github.com/mibusix/Device-Management" target="_blank"
       class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-gray-400 hover:text-gray-600 transition-colors text-sm">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      <span>GitHub</span>
    </a>
  </div>
</body>
</html>
