{% extends "base.html" %}
{% block title %}类型管理{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto" x-data="typeManager()">
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold text-gray-800">设备类型管理</h1>
    <button @click="showTypeForm(null)" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-600 text-white rounded-lg text-sm hover:bg-primary-700">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      添加类型
    </button>
  </div>

  <div class="space-y-4">
    <template x-for="t in types" :key="t.id">
      <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
        <div class="px-5 py-4 bg-gray-50 flex items-center justify-between">
          <div>
            <h2 class="font-semibold text-gray-800" x-text="t.name"></h2>
            <p class="text-sm text-gray-500" x-text="t.description || ''"></p>
          </div>
          <div class="flex items-center gap-2">
            <button @click="showTypeForm(t)" class="text-sm text-primary-600 hover:text-primary-700">编辑</button>
            <button @click="deleteType(t.id, t.name)" class="text-sm text-red-600 hover:text-red-700">删除</button>
            <button @click="showFieldForm(t.id, t.name, null)" class="ml-2 px-3 py-1 bg-primary-600 text-white text-xs rounded-lg hover:bg-primary-700">+ 添加字段</button>
          </div>
        </div>

        <!-- 子类型 -->
        <div class="px-5 py-3 border-b bg-gray-50/50">
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-500 font-medium">子类型</span>
            <button @click="showSubTypeForm(t.id, t.name, null)" class="text-xs text-primary-600 hover:text-primary-700">+ 添加</button>
          </div>
          <div class="flex flex-wrap gap-2 mt-2">
            <template x-for="st in t.sub_types" :key="st.id">
              <span class="inline-flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded-full">
                <span x-text="st.name"></span>
                <button @click="deleteSubType(st.id, st.name)" class="hover:text-red-600">&times;</button>
              </span>
            </template>
          </div>
        </div>

        <!-- 自定义字段 -->
        <div class="divide-y">
          <template x-for="f in t.fields" :key="f.id">
            <div class="px-5 py-3 flex items-center justify-between hover:bg-gray-50">
              <div class="text-sm">
                <span class="font-medium" x-text="f.name"></span>
                <span class="text-gray-400 ml-2" x-text="`(${f.type})`"></span>
                <span x-show="f.unit" class="text-gray-400" x-text="`单位: ${f.unit}`"></span>
                <span x-show="f.required" class="text-red-400 text-xs ml-1">*必填</span>
              </div>
              <div class="flex items-center gap-2">
                <button @click="showFieldForm(t.id, t.name, f)" class="text-xs text-primary-600 hover:text-primary-700">编辑</button>
                <button @click="deleteField(f.id, f.name)" class="text-xs text-red-600 hover:text-red-700">删除</button>
              </div>
            </div>
          </template>
          <template x-if="t.fields.length === 0">
            <div class="px-5 py-4 text-center text-sm text-gray-400">暂无自定义字段</div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Type Form Modal -->
  <div x-show="showTypeModal" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="showTypeModal = false">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
      <h3 class="font-semibold text-lg mb-4" x-text="editingType ? '编辑类型' : '添加类型'"></h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">名称 <span class="text-red-500">*</span></label>
          <input type="text" x-model="typeForm.name" class="w-full px-3 py-2 border rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
          <textarea x-model="typeForm.description" rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button @click="showTypeModal = false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
        <button @click="saveType()" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm">保存</button>
      </div>
    </div>
  </div>

  <!-- Field Form Modal -->
  <div x-show="showFieldModal" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="showFieldModal = false">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
      <h3 class="font-semibold text-lg mb-4">
        自定义字段 — <span x-text="currentTypeName" class="text-primary-600"></span>
        <span x-text="editingField ? '(编辑)' : '(添加)'" class="text-sm text-gray-400"></span>
      </h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">字段名称 <span class="text-red-500">*</span></label>
          <input type="text" x-model="fieldForm.field_name" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例如：制冷剂型号">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">字段类型</label>
            <select x-model="fieldForm.field_type" class="w-full px-3 py-2 border rounded-lg text-sm">
              <option value="text">文本</option>
              <option value="number">数字</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">单位</label>
            <input type="text" x-model="fieldForm.unit" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="如：kW、°C">
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" x-model="fieldForm.required" :value="1" class="rounded">
          <label class="text-sm text-gray-700">必填</label>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button @click="showFieldModal = false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
        <button @click="saveField()" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm">保存</button>
      </div>
    </div>
  </div>

  <!-- SubType Form Modal -->
  <div x-show="showSubTypeModal" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50" @click.self="showSubTypeModal = false">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md mx-4">
      <h3 class="font-semibold text-lg mb-4">
        子类型 — <span x-text="currentTypeName" class="text-primary-600"></span>
      </h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">名称 <span class="text-red-500">*</span></label>
          <input type="text" x-model="subTypeForm.name" class="w-full px-3 py-2 border rounded-lg text-sm" placeholder="例如：冷却水泵">
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-6">
        <button @click="showSubTypeModal = false" class="px-4 py-2 border rounded-lg text-sm">取消</button>
        <button @click="saveSubType()" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm">保存</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function typeManager() {
  return {
    types: [],
    showTypeModal: false,
    editingType: null,
    typeForm: { name: '', description: '' },

    showFieldModal: false,
    editingField: null,
    currentTypeId: null,
    currentTypeName: '',
    fieldForm: { field_name: '', field_type: 'text', unit: '', required: false },

    showSubTypeModal: false,
    subTypeForm: { name: '' },

    init() {
      this.loadTypes();
    },

    async loadTypes() {
      const r = await fetch('/api/types/');
      this.types = await r.json();
    },

    showTypeForm(type) {
      this.editingType = type;
      this.typeForm = type ? { name: type.name, description: type.description } : { name: '', description: '' };
      this.showTypeModal = true;
    },

    async saveType() {
      const isEdit = this.editingType !== null;
      const url = isEdit ? `/api/types/${this.editingType.id}` : '/api/types/';
      const method = isEdit ? 'PUT' : 'POST';
      await fetch(url, {
        method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(this.typeForm),
      });
      this.showTypeModal = false;
      this.loadTypes();
    },

    deleteType(id, name) {
      if (confirm(`确定删除类型「${name}」吗？`)) {
        fetch(`/api/types/${id}`, { method: 'DELETE' })
          .then(r => r.json()).then(() => this.loadTypes());
      }
    },

    showFieldForm(typeId, typeName, field) {
      this.currentTypeId = typeId;
      this.currentTypeName = typeName;
      this.editingField = field;
      this.fieldForm = field
        ? { field_name: field.name, field_type: field.type, unit: field.unit, required: field.required }
        : { field_name: '', field_type: 'text', unit: '', required: false };
      this.showFieldModal = true;
    },

    async saveField() {
      const isEdit = this.editingField !== null;
      const url = isEdit ? `/api/types/fields/${this.editingField.id}` : '/api/types/fields';
      const method = isEdit ? 'PUT' : 'POST';
      await fetch(url, {
        method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          ...this.fieldForm,
          device_type_id: this.currentTypeId,
          required: this.fieldForm.required ? 1 : 0,
          sort_order: 0,
        }),
      });
      this.showFieldModal = false;
      this.loadTypes();
    },

    deleteField(id, name) {
      if (confirm(`确定删除字段「${name}」吗？`)) {
        fetch(`/api/types/fields/${id}`, { method: 'DELETE' })
          .then(r => r.json()).then(() => this.loadTypes());
      }
    },

    showSubTypeForm(typeId, typeName, subType) {
      this.currentTypeId = typeId;
      this.currentTypeName = typeName;
      this.subTypeForm = subType ? { name: subType.name } : { name: '' };
      this.showSubTypeModal = true;
    },

    async saveSubType() {
      await fetch('/api/types/sub-types', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ ...this.subTypeForm, device_type_id: this.currentTypeId, description: '' }),
      });
      this.showSubTypeModal = false;
      this.loadTypes();
    },

    deleteSubType(id, name) {
      if (confirm(`确定删除子类型「${name}」吗？`)) {
        fetch(`/api/types/sub-types/${id}`, { method: 'DELETE' })
          .then(r => r.json()).then(() => this.loadTypes());
      }
    }
  }
}
</script>
{% endblock %}
